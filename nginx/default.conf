server {
    listen 80;

    # Frontend
    location / {
        proxy_pass http://frontend:80;
    }

    # 🔥 Backend API (optional but recommended)
    location /api {
        proxy_pass http://backend:5000;
    }

    # 🔥 IMPORTANT: Prometheus metrics
    location /metrics {
        proxy_pass http://backend:5000/metrics;
    }
}
