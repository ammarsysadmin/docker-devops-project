version: "3.3"

services:

  frontend:
    build: ./frontend
    ports:
      - "8000:80"

  backend:
    build: ./backend
    ports:
      - "5001:5000"
    env_file:
      - .env
    restart: always

  db:
    image: mongo
    volumes:
      - mongo_data:/data/db

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"

  prometheus:
    image: prom/prometheus
    depends_on:
      - backend
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana

volumes:
  mongo_data:
  grafana_data:
